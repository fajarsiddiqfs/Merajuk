backend:
  name: git-gateway
  branch: main  # your default branch
  commit_messages:
    create: "Create new {{collection}} '{{slug}}'"
    update: "Update {{collection}} '{{slug}}'"
    delete: "Delete {{collection}} '{{slug}}'"

media_folder: "assets/uploads"      # folder for uploaded images
public_folder: "/assets/uploads"    # path used in HTML/JSON

collections:
  - name: "products"
    label: "Products"
    folder: "data/products"
    create: true
    slug: "{{slug}}"
    format: "json"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Price", name: "price", widget: "string" }
      - { label: "Category", name: "category", widget: "select", options: ["tech","wear","home","work","lifestyle"] }
      - { label: "Image", name: "image", widget: "image" }
