  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      background-color: #0a0a0a;
      color: #e8e8e8;
      line-height: 1.6;
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes cardPop {
      from { opacity: 0; transform: translateY(20px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 60px 24px;
    }

    header {
      margin-bottom: 24px;
      text-align: center;
      max-width: 680px;
      margin-left: auto;
      margin-right: auto;
      animation: fadeInDown 0.6s ease both;
    }

    .logo {
      font-size: 15px;
      font-weight: 500;
      letter-spacing: -0.01em;
      margin-bottom: 40px;
      color: #e8e8e8;
    }

    .logo img { filter: brightness(0) invert(1); }

    .search-form {
      display: flex;
      align-items: center;
      position: relative;
      max-width: 600px;
      margin: 0 auto 16px;
      animation: fadeInDown 0.6s 0.1s ease both;
    }

    .search-icon {
      position: absolute;
      left: 18px;
      color: #555;
      font-size: 16px;
      pointer-events: none;
    }

    #searchInput {
      flex: 1;
      padding: 14px 18px 14px 48px;
      border: 1px solid #222;
      border-radius: 10px;
      font-size: 15px;
      background-color: #141414;
      color: #e8e8e8;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #searchInput::placeholder { color: #555; }

    #searchInput:focus {
      outline: none;
      border-color: #444;
      box-shadow: 0 0 0 3px rgba(255,255,255,0.05);
    }

    #clearSearch {
      position: absolute;
      right: 12px;
      padding: 8px;
      background: transparent;
      color: #555;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
    }

    #clearSearch:hover { background: #1f1f1f; color: #e8e8e8; }

    .disclaimer {
      font-size: 13px;
      color: #555;
      line-height: 1.5;
      margin-bottom: 0;
      animation: fadeInDown 0.6s 0.15s ease both;
    }

    .sub-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 600px;
      margin: 12px auto 16px;
      animation: fadeInDown 0.6s 0.12s ease both;
    }

    .sub-bar-left {
      font-size: 12px;
      font-weight: 400;
      color: #555;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sub-bar-right {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #555;
    }

    .sub-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      opacity: 0.75;
      transition: opacity 0.2s;
      flex-shrink: 0;
    }

    .sub-icon svg {
      width: 18px;
      height: 18px;
    }

    .sub-icon:hover { opacity: 1; }

    .categories {
      display: flex;
      gap: 10px;
      flex-wrap: nowrap;
      overflow-x: auto;
      margin-bottom: 40px;
      padding-bottom: 8px;
      -webkit-overflow-scrolling: touch;
      animation: fadeInDown 0.6s 0.2s ease both;
      scrollbar-width: none;
    }

    .categories::-webkit-scrollbar { display: none; }

    .category-btn {
      padding: 9px 22px;
      background-color: #141414;
      color: #777;
      border: 1px solid #222;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .category-btn:hover { background: #1c1c1c; border-color: #444; color: #e8e8e8; }

    .category-btn.active {
      background-color: #e8e8e8;
      color: #0a0a0a;
      border-color: #e8e8e8;
    }

    .products-section { margin-top: 40px; }

    .featured-products {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 40px;
    }

    .product-card {
      background-color: #111;
      border: 1px solid #1e1e1e;
      border-radius: 14px;
      overflow: hidden;
      transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      opacity: 0;
    }

    .product-card.visible {
      animation: cardPop 0.45s ease forwards;
    }

    .product-card:hover {
      transform: translateY(-6px);
      border-color: #333;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    }

    .product-card a {
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .product-image {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: linear-gradient(135deg, #161616, #1a1a1a);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #444;
      overflow: hidden;
      position: relative;
    }

    .product-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }

    .product-card:hover .product-image img { transform: scale(1.04); }

    .product-info {
      padding: 18px 20px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-top: auto;
      border-top: 1px solid #1a1a1a;
    }

    .product-title {
      font-size: 15px;
      font-weight: 500;
      color: #e8e8e8;
      line-height: 1.4;
    }

    .product-price {
      font-size: 14px;
      color: #888;
      font-weight: 500;
      white-space: nowrap;
      margin-left: 12px;
    }

    .show-more-container {
      text-align: center;
      margin-top: 48px;
      margin-bottom: 60px;
      animation: fadeInUp 0.5s 0.3s ease both;
    }

    .show-more-btn {
      padding: 13px 40px;
      background: transparent;
      color: #e8e8e8;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s ease;
      letter-spacing: 0.01em;
    }

    .show-more-btn:hover {
      background: #e8e8e8;
      color: #0a0a0a;
      border-color: #e8e8e8;
    }

    .show-more-container h6 {
      margin-top: 4px;
      font-size: 13px;
      color: #444;
      font-weight: 400;
      letter-spacing: 0.03em;
    }

    .tagline-logo {
      margin-bottom: 4px;
      opacity: 1;
    }

    footer {
      margin-top: 80px;
      padding-top: 32px;
      border-top: 1px solid #1a1a1a;
      display: flex;
      justify-content: space-between;
      align-items: center;
      animation: fadeInUp 0.5s 0.4s ease both;
    }

    .footer-left { font-size: 13px; color: #444; }

    .footer-brand-link {
      color: #666;
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-brand-link:hover { color: #e8e8e8; }

    .footer-right { display: flex; gap: 20px; }

    .social-link {
      color: #555;
      text-decoration: none;
      transition: opacity 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
    }

    .social-link:hover { opacity: 0.7; }

    .social-svg {
      width: 20px;
      height: 20px;
    }

    .empty-msg {
      text-align: center;
      color: #444;
      grid-column: 1/-1;
      padding: 60px 0;
      font-size: 15px;
    }

    @media (max-width: 1024px) {
      .featured-products { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 640px) {
      .container { padding: 40px 16px; }
      .search-form { max-width: 100%; }
      #searchInput { font-size: 16px; }
      .categories { gap: 8px; }
      .category-btn { padding: 8px 16px; font-size: 13px; }
      .featured-products { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      .product-info { padding: 12px 14px; }
      .product-title { font-size: 13px; }
      .product-price { font-size: 12px; }
      footer { flex-direction: column; gap: 16px; text-align: center; }
      .footer-right { justify-content: center; }
    }
  </style>
</head>

      pointer-events: none;
    }
    .scroll-fab.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: all;
    }
    .scroll-fab:hover {
      background: #e8e8e8;
      color: #0a0a0a;
      border-color: #e8e8e8;
    }
    #scrollIcon { transition: transform 0.3s ease; }
  </style>

  <script>
    const fab = document.getElementById('scrollFab');
    const icon = document.getElementById('scrollIcon');
    const atBottom = () => window.scrollY + window.innerHeight >= document.body.scrollHeight - 40;

    function scrollToggle() {
      if (atBottom()) {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } else {
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
      }
    }

    window.addEventListener('scroll', () => {
      fab.classList.toggle('visible', window.scrollY > 200);
      icon.style.transform = atBottom() ? 'rotate(180deg)' : 'rotate(0deg)';
    });
  </script>

  <script>
    const phrases = [
      'Carik Produk Tech...',
      'Carik Produk Rumah...',
      'Carik Produk Pakaian...',
      'Carik Produk Kerja...',
      'Carik Produk Gaya Hidup...'
    ];

    const inp = document.getElementById('searchInput');
    let pi = 0, ci = 0, typingTimer2;

    function type() {
      if (inp.value !== '') return;
      const phrase = phrases[pi];
      ci++;
      inp.placeholder = phrase.slice(0, ci);
      if (ci < phrase.length) {
        typingTimer2 = setTimeout(type, 70);
      } else {
        typingTimer2 = setTimeout(erase, 1800);
      }
    }

    function erase() {
      if (inp.value !== '') return;
      ci--;
      inp.placeholder = phrases[pi].slice(0, ci);
      if (ci > 0) {
        typingTimer2 = setTimeout(erase, 35);
      } else {
        pi = (pi + 1) % phrases.length;
        typingTimer2 = setTimeout(type, 400);
      }
    }

    inp.addEventListener('input', () => {
      if (inp.value === '') { clearTimeout(typingTimer2); setTimeout(type, 600); }
    });

    setTimeout(type, 800);
  </script>
