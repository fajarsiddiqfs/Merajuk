      { "title": "Lampu Meja", "price": "RM564", "category": "home", "image": "images/product30.png", "link": "https://merajuk.com?via=merajuk" }
    ];

    let currentlyShowing = isMobile() ? 10 : 9;
    let currentCategory = 'all';
    let searchQuery = '';
    const showPerClick = isMobile() ? 10 : 9;

    function renderProducts() {
      const grid = document.getElementById('products-grid');
      grid.innerHTML = '';

      let filtered = currentCategory === 'all' ? products : products.filter(p => p.category === currentCategory);
      if (searchQuery) {
        filtered = filtered.filter(p => p.title.toLowerCase().includes(searchQuery.toLowerCase()));
      }

      const visible = filtered.slice(0, currentlyShowing);

      if (filtered.length === 0) {
        grid.innerHTML = '<p class="empty-msg">Tiada produk dijumpai.</p>';
        document.querySelector('.show-more-btn').style.display = 'none';
        return;
      }

      visible.forEach((p, i) => {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.innerHTML = `
          <a href="${p.link}" target="_blank" rel="noopener noreferrer">
            <div class="product-image"><img src="${p.image}" alt="${p.title}" loading="lazy"></div>
            <div class="product-info">
              <h3 class="product-title">${p.title}</h3>
              <span class="product-price">${p.price}</span>
            </div>
          </a>
        `;
        grid.appendChild(card);

        setTimeout(() => {
          card.classList.add('visible');
          card.style.animationDelay = (i % showPerClick * 0.05) + 's';
        }, 10);
      });

      document.querySelector('.show-more-btn').style.display =
        filtered.length > currentlyShowing ? 'inline-block' : 'none';
    }

    function filterCategory(category, btn) {
      currentCategory = category;
      currentlyShowing = isMobile() ? 10 : 9;
      document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderProducts();
    }

    function showMore() {
      currentlyShowing += showPerClick;
      renderProducts();
    }

    function handleSearch() {
      const input = document.getElementById('searchInput');
      const clearBtn = document.getElementById('clearSearch');
      searchQuery = input.value.trim();
      currentlyShowing = isMobile() ? 10 : 9;
      clearBtn.style.display = searchQuery ? 'flex' : 'none';
      renderProducts();
    }

    function clearSearch() {
      const input = document.getElementById('searchInput');
      document.getElementById('clearSearch').style.display = 'none';
      input.value = '';
      searchQuery = '';
      currentlyShowing = isMobile() ? 10 : 9;
      renderProducts();
    }

    renderProducts();
  </script>

    .scroll-fab:hover {
      background: #e8e8e8;
      color: #0a0a0a;
      border-color: #e8e8e8;
    }
    #scrollIcon { transition: transform 0.3s ease; }
  </style>

  <script>
    const fab = document.getElementById('scrollFab');
    const icon = document.getElementById('scrollIcon');
    const atBottom = () => window.scrollY + window.innerHeight >= document.body.scrollHeight - 40;

    function scrollToggle() {
      if (atBottom()) {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } else {
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
      }
    }

    window.addEventListener('scroll', () => {
      fab.classList.toggle('visible', window.scrollY > 200);
      icon.style.transform = atBottom() ? 'rotate(180deg)' : 'rotate(0deg)';
    });
  </script>
</body>
</html>
